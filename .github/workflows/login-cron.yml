name: Run Login Stress Test Cron

on:
  schedule:
    # Runs every hour. Change this cron expression to your desired schedule.
    # E.g., '0 0 * * *' to run daily at midnight UTC.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Login Test
        run: node login-test.js

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-reports
          path: summary-report-login-*.json
          if-no-files-found: warn

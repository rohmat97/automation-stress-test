name: Run Get User Stress Test Cron

on:
  schedule:
    # Runs daily at midnight UTC (each run takes ~5.5 hours, so hourly would overlap)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour maximum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Get User Test
        env:
          TEST_DURATION_MINUTES: '330'
          TARGET_RPS: '50'
          CONCURRENCY_LIMIT: '10'
        run: node get-user-test.js

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: get-user-test-reports
          path: summary-report-getuser-*.json
          if-no-files-found: warn

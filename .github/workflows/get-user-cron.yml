name: Run Get User Stress Test Cron

on:
  schedule:
    # Runs every hour. Change this cron expression to your desired schedule.
    # E.g., '0 0 * * *' to run daily at midnight UTC.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Get User Test
        run: |
          max_attempts=5
          attempt=1
          success=false

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts..."
            if node get-user-test.js; then
              echo "Test completed successfully!"
              success=true
              break
            else
              echo "Test failed. Retrying in 10 seconds..."
              sleep 10
            fi
            attempt=$((attempt + 1))
          done

          if [ "$success" = false ]; then
            echo "All retry attempts failed."
            exit 1
          fi

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: get-user-test-reports
          path: summary-report-getuser-*.json
          if-no-files-found: warn

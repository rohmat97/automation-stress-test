name: Scheduled GET Automation Test

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour maximum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run GET Automation Test
        env:
          TEST_DURATION_MINUTES: '330'
          TARGET_RPS: '50'
          CONCURRENCY_LIMIT: '10'
        run: node index.js

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always() # Upload report even if the run fails or times out
        with:
          name: performance-reports
          path: summary-report-*.json
          if-no-files-found: ignore

name: Scheduled GET Automation Test

on:
  schedule:
    # Runs at 00:00 UTC every day. Customize the cron expression as needed.
    # To learn more about cron syntax: https://crontab.guru/
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run GET Automation Test
        run: node index.js

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always() # Upload report even if the run fails or times out
        with:
          name: performance-reports
          path: summary-report-*.json
          if-no-files-found: ignore

name: Scheduled GET Automation Test

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour maximum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Connect to Proton VPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          echo "${{ secrets.OVPN_USERNAME }}" > /tmp/vpn-auth.txt
          echo "${{ secrets.OVPN_PASSWORD }}" >> /tmp/vpn-auth.txt
          sudo openvpn --config vpn.ovpn --auth-user-pass /tmp/vpn-auth.txt --daemon --log /tmp/vpn.log
          echo "Waiting for VPN connection..."
          for i in $(seq 1 30); do
            if ip a show tun0 > /dev/null 2>&1; then
              echo "VPN connected!"
              curl -s https://api.ipify.org && echo ""
              break
            fi
            sleep 2
          done
          if ! ip a show tun0 > /dev/null 2>&1; then
            echo "VPN connection failed. Logs:"
            cat /tmp/vpn.log
            exit 1
          fi

      - name: Run GET Automation Test
        run: node index.js

      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn || true

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: summary-report-*.json
          if-no-files-found: ignore
